version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: ai-crm-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: ai_crm
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-crm-network

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: ai-crm-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ai-crm-network

  # AI Microservice
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ai-crm-ai-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - AI_SERVICE_API_KEY=your_ai_service_api_key
      - MODEL_PATH=data/model.pkl
      - DATA_PATH=data/synthetic_leads.csv
    volumes:
      - ai_model_data:/app/data
    networks:
      - ai-crm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-crm-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/ai_crm
      - JWT_SECRET=your_super_secret_jwt_key_change_this_in_production
      - JWT_ACCESS_EXPIRATION=15m
      - JWT_REFRESH_EXPIRATION=7d
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
      - AI_SERVICE_API_KEY=your_ai_service_api_key
      - CLIENT_URL=http://localhost:5173
    depends_on:
      - mongodb
      - redis
      - ai-service
    networks:
      - ai-crm-network

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-crm-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ai-crm-network

volumes:
  mongodb_data:
  redis_data:
  ai_model_data:

networks:
  ai-crm-network:
    driver: bridge

